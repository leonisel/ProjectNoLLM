<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvix NoLLM — Cognitive AI</title>
  <!-- Vis Network CDN for beautiful interactive 2D graphs -->
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:16px;color:#333}

    /* ── layout ── */
    .shell{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:220px 1fr 260px;gap:14px;height:calc(100vh - 32px)}

    /* ── panels ── */
    .panel{background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.12);display:flex;flex-direction:column;overflow:hidden}
    .panel-head{padding:14px 16px;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#667eea;border-bottom:2px solid #667eea;flex-shrink:0}
    .panel-body{flex:1;overflow-y:auto;padding:12px 14px}

    /* ── stat items ── */
    .stat{margin-bottom:12px;padding:10px 12px;background:#f5f5f5;border-radius:8px;border-left:4px solid #667eea}
    .stat-label{font-size:11px;color:#888;text-transform:uppercase;font-weight:600}
    .stat-value{font-size:22px;font-weight:700;color:#667eea;margin-top:2px}
    .mood-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
    .m-excited{background:#ff6b6b}.m-curious{background:#ffd93d}
    .m-thinking{background:#6bcf7f}.m-satisfied{background:#74b9ff}.m-bored{background:#b2bec3}

    /* ── buttons ── */
    button{padding:9px 14px;border:none;border-radius:7px;font-weight:600;cursor:pointer;font-size:13px;transition:all .2s}
    .btn-pri{background:#667eea;color:#fff}.btn-pri:hover{background:#5568d3;transform:translateY(-1px)}
    .btn-sec{background:#f5f5f5;color:#333;border:2px solid #667eea}.btn-sec:hover{background:#667eea;color:#fff}
    .btn-danger{background:#ff6b6b;color:#fff}.btn-danger:hover{background:#e55757}
    .btn-green{background:#00b894;color:#fff}.btn-green:hover{background:#00a381}
    button:disabled{opacity:.5;cursor:not-allowed}
    .btn-group{display:flex;flex-direction:column;gap:8px;margin-top: auto; padding-top: 10px;}
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #202021; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    button.tool-btn { 
        display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 16px; 
        background: transparent; border: none; color: #b5b5b5; text-align: left; cursor: pointer;
        border-left: 3px solid transparent; transition: all 0.15s ease; font-size: 13px;
    }
    button.tool-btn:hover { background-color: #2d2d30; color: #ffffff; }
    button.tool-btn.active { background-color: #2d2d30; border-left: 3px solid #f07b3f; color: #f07b3f; font-weight: bold; }
    
    .property-group { margin-bottom: 16px; background: #262627; padding: 10px; border-radius: 6px; border: 1px solid #2d2d2f; }
    .property-group-title { font-size: 11px; font-weight: 700; color: #a0a0a0; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em;}
    .property-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .property-row label { font-size: 12px; color: #ccc; }
    .input-row { display: flex; gap: 4px; margin-bottom: 4px; flex-grow: 1; }
    .input-row span { font-size: 10px; color: #ff6b6b; width: 12px; text-align: center; line-height: 24px; font-weight: bold;}
    .input-row span.m-green { color: #00b894; }
    
    .menu-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .menu-item:hover {
      background: #f0f0f0;
      color: #667eea;
    }

    /* ── tabs ── */
    .tabs{display:flex;border-bottom:2px solid #eee;background:#fafafa;flex-shrink:0}
    .tab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:#888;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px}
    .tab.active{color:#667eea;border-color:#667eea}
    .tab:hover{color:#667eea}
    .tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden}
    .tab-pane.active{display:flex}

    /* ── chat ── */
    .messages{flex:1;overflow-y:auto;padding:12px;scroll-behavior:smooth}
    .msg{margin-bottom:12px;animation:fadeUp .25s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{text-align:right}
    .msg.agent{text-align:left}
    .bubble{display:inline-block;max-width:82%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
    .msg.user .bubble{background:#667eea;color:#fff;border-bottom-right-radius:3px}
    .msg.agent .bubble{background:#f0f0f0;color:#333;border-bottom-left-radius:3px}
    .msg.system .bubble{background:#e3f2fd;color:#1565c0;border-radius:8px;max-width:96%}
    .ts{font-size:11px;color:#bbb;margin-top:3px}
    .input-row{display:flex;gap:8px;padding:12px;border-top:2px solid #f0f0f0;flex-shrink:0}
    .input-row input{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px}
    .input-row input:focus{outline:none;border-color:#667eea}

    /* ── memory panel ── */
    .topic-block{margin-bottom:12px;padding:10px;background:#f9f9f9;border-radius:8px;border-left:4px solid #764ba2}
    .topic-name{font-weight:600;color:#764ba2;font-size:12px;margin-bottom:6px}
    .fact-row{font-size:11px;color:#555;padding:2px 0 2px 12px;position:relative;line-height:1.4}
    .fact-row:before{content:"→";position:absolute;left:0;color:#667eea}
    .conf-bar{font-size:10px;color:#aaa}

    /* ── crawler tab ── */
    .crawl-body{padding:14px;flex:1;overflow-y:auto}
    .crawl-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
    .crawl-row{display:flex;gap:8px;align-items:center}
    .crawl-row label{font-size:12px;font-weight:600;color:#555;white-space:nowrap;width:80px}
    .crawl-row input,.crawl-row select{flex:1;padding:8px 10px;border:2px solid #e0e0e0;border-radius:7px;font-size:13px}
    .crawl-row input:focus,.crawl-row select:focus{outline:none;border-color:#667eea}
    #crawl-url{width:100%}

    .eval-section{margin-bottom:16px}
    .eval-section h3{font-size:12px;font-weight:700;text-transform:uppercase;color:#667eea;margin-bottom:8px;letter-spacing:.05em}
    .eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .eval-card{background:#f5f5f5;border-radius:7px;padding:8px 10px;border-left:3px solid #667eea}
    .eval-card .ev-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:600}
    .eval-card .ev-val{font-size:18px;font-weight:700;color:#667eea;margin-top:2px}
    .quality-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:10px}
    .qa{background:#d4edda;color:#155724}.qb{background:#d1ecf1;color:#0c5460}
    .qc{background:#fff3cd;color:#856404}.qd{background:#f8d7da;color:#721c24}.qf{background:#e2e3e5;color:#383d41}

    .page-item{margin-bottom:8px;padding:8px 10px;background:#f9f9f9;border-radius:7px;border-left:3px solid #764ba2;font-size:12px}
    .page-title{font-weight:600;color:#333;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .page-meta{color:#888;font-size:11px}
    .page-error{color:#e74c3c;font-size:11px}

    .fact-list{font-size:12px}
    .fact-list .fl-row{padding:4px 0;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;align-items:baseline}
    .fl-subj{font-weight:600;color:#333;min-width:70px}
    .fl-rel{color:#764ba2;font-style:italic;min-width:80px}
    .fl-obj{color:#555;flex:1}
    .fl-conf{color:#aaa;font-size:10px;white-space:nowrap}

    .infer-note{background:#e8f5e9;border-left:3px solid #4caf50;padding:8px 10px;border-radius:6px;font-size:12px;color:#2e7d32;margin-top:8px}

    .crawl-progress{background:#f0f7ff;border:1px solid #bee3f8;border-radius:8px;padding:10px 12px;font-size:12px;color:#2c5282;display:none}

    .empty-state{text-align:center;color:#bbb;padding:20px;font-size:13px}
    
    /* ── graph container ── */
    #graph-container {
      flex: 1;
      width: 100%;
      height: 100%;
      background: #fafafa;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── LEFT: Stats ── -->
  <div class="panel">
    <div class="panel-head">Status</div>
    <div class="panel-body" style="display:flex; flex-direction:column;">
      <div class="stat">
        <div class="stat-label">Mood</div>
        <div class="stat-value"><span class="mood-dot m-curious" id="mood-dot"></span><span id="mood-text">Curious</span></div>
      </div>
      <div class="stat"><div class="stat-label">Interactions</div><div class="stat-value" id="si">0</div></div>
      <div class="stat"><div class="stat-label">Topics</div><div class="stat-value" id="st">0</div></div>
      <div class="stat"><div class="stat-label">Facts</div><div class="stat-value" id="sf">0</div></div>
      <div class="stat"><div class="stat-label">Graph edges</div><div class="stat-value" id="sg">0</div></div>
      <div class="stat"><div class="stat-label">Conflicts</div><div class="stat-value" id="sc">0</div></div>

      <div class="btn-group">
        <button class="btn-sec" onclick="getThought()">💭 Thoughts</button>
        <button class="btn-sec" onclick="doDream()">🌙 Dream Now</button>
        <button class="btn-sec" onclick="doReflect()">🔍 Reflect</button>
        <button class="btn-sec" onclick="refreshStats()">↺ Refresh</button>
        <button class="btn-danger" onclick="doForget()">✕ Forget All</button>
      </div>
    </div>
  </div>

  <!-- ── CENTRE: Chat + Crawler + Graph tabs ── -->
  <div class="panel">
    <div style="padding:12px 16px 4px;border-bottom:2px solid #667eea;flex-shrink:0;display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🧠</span>
      <span style="font-size:18px;font-weight:700;color:#667eea">Jarvix NoLLM</span>
      <span style="font-size:12px;color:#aaa;margin-left:4px">v6.0</span>
    </div>

    <!-- tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('chat',this)">💬 Chat</div>
      <div class="tab" onclick="switchTab('crawler',this)">🌐 Web Crawler</div>
      <div class="tab" onclick="switchTab('graph',this); loadGraph();">📊 Knowledge Graph</div>
    </div>

    <!-- CHAT pane -->
    <div class="tab-pane active" id="pane-chat">
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input type="text" id="msg-input"
          placeholder="Teach me, ask me, or type a command… (/help for commands)"
          onkeypress="onKey(event)">
        <button class="btn-pri" id="btn-send" onclick="sendMsg()">Send</button>
      </div>
    </div>

    <!-- CRAWLER pane -->
    <div class="tab-pane" id="pane-crawler">
      <div class="crawl-body">
        <div class="crawl-form">
          <div class="crawl-row">
            <label>URL</label>
            <input type="text" id="crawl-url"
              placeholder="https://en.wikipedia.org/wiki/Machine_learning">
          </div>
          <div class="crawl-row">
            <label>Depth</label>
            <select id="crawl-depth">
              <option value="0">0 — single page</option>
              <option value="1" selected>1 — page + links</option>
              <option value="2">2 — two hops</option>
            </select>
          </div>
          <div class="crawl-row">
            <label>Max pages</label>
            <select id="crawl-pages">
              <option value="3">3</option>
              <option value="5">5</option>
              <option value="8" selected>8</option>
              <option value="12">12</option>
              <option value="15">15</option>
            </select>
          </div>
          <button class="btn-green" id="btn-crawl" onclick="startCrawl()">
            🌐 Crawl & Learn
          </button>
        </div>

        <div class="crawl-progress" id="crawl-progress">
          ⏳ Crawling… this may take a few seconds.
        </div>

        <div id="eval-output"></div>
      </div>
    </div>

    <!-- GRAPH pane -->
    <div class="tab-pane" id="pane-graph" style="position:relative;">
      <div id="graph-container"></div>
    </div>
  </div>

  <!-- ── RIGHT: Memory ── -->
  <div class="panel">
    <div class="panel-head">Memory</div>
    <div class="panel-body" id="mem-panel">
      <div class="empty-state">Waiting to learn…</div>
    </div>
  </div>

</div>

<script>
let network = null;

// ── tab switching ─────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

// ── mood ──────────────────────────────────────────────────────────
const MOOD_EMOJI = {excited:'🤩',curious:'🤔',thinking:'💭',satisfied:'😌',bored:'😑'};
const MOOD_CLS   = {excited:'m-excited',curious:'m-curious',thinking:'m-thinking',
                    satisfied:'m-satisfied',bored:'m-bored'};
function setMood(mood) {
  const dot  = document.getElementById('mood-dot');
  const text = document.getElementById('mood-text');
  dot.className  = 'mood-dot ' + (MOOD_CLS[mood]  || 'm-curious');
  text.textContent = (MOOD_EMOJI[mood] || '🤔') + ' ' + mood.charAt(0).toUpperCase() + mood.slice(1);
}

// ── stats ─────────────────────────────────────────────────────────
function refreshStats() {
  fetch('/api/stats').then(r=>r.json()).then(d => {
    if (!d.success) return;
    const s = d.stats;
    document.getElementById('si').textContent = s.total_interactions || 0;
    document.getElementById('st').textContent = s.flat_topics   || s.topics_known || 0;
    document.getElementById('sf').textContent = s.flat_facts    || s.total_facts  || 0;
    document.getElementById('sg').textContent = s.graph_edges   || 0;
    document.getElementById('sc').textContent = s.contradictions|| 0;
    setMood(s.mood || s.emotional_state || 'curious');
  }).catch(()=>{});
}

// ── memory panel ──────────────────────────────────────────────────
function updateMemory() {
  fetch('/api/memory').then(r=>r.json()).then(d => {
    const panel = document.getElementById('mem-panel');
    if (!d.success || !Object.keys(d.memory).length) {
      panel.innerHTML = '<div class="empty-state">Waiting to learn…</div>';
      return;
    }
    let html = '';
    for (const [topic, facts] of Object.entries(d.memory)) {
      html += `<div class="topic-block">
        <div class="topic-name">📚 ${topic}</div>`;
      for (const f of facts) {
        const pct = Math.round(f.confidence * 100);
        html += `<div class="fact-row">${f.fact.substring(0,55)}${f.fact.length>55?'…':''}
          <div class="conf-bar">${'█'.repeat(Math.round(pct/10))}${'░'.repeat(10-Math.round(pct/10))} ${pct}%</div>
        </div>`;
      }
      html += '</div>';
    }
    panel.innerHTML = html;
  }).catch(()=>{});
}

// ── chat ──────────────────────────────────────────────────────────
function addMsg(text, role) {
  const div = document.getElementById('messages');
  const el  = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = `<div class="bubble">${escHtml(text)}</div>
    <div class="ts">${new Date().toLocaleTimeString()}</div>`;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}
function escHtml(t) {
  return t.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
}
function sysMsg(text) {
  const div = document.getElementById('messages');
  const el  = document.createElement('div');
  el.className = 'msg system';
  el.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}

function sendMsg() {
  const inp = document.getElementById('msg-input');
  const msg = inp.value.trim();
  if (!msg) return;
  addMsg(msg, 'user');
  inp.value = '';
  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = '…';
  fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message: msg})
  })
  .then(r=>r.json())
  .then(d => {
    if (d.success) {
      addMsg(d.response, 'agent');
      setMood(d.mood || 'curious');
      refreshStats();
      updateMemory();
    } else {
      addMsg('Error: ' + d.error, 'agent');
    }
  })
  .catch(e => addMsg('Connection error: ' + e.message, 'agent'))
  .finally(() => { btn.disabled = false; btn.textContent = 'Send'; });
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function getThought() {
  fetch('/api/thoughts').then(r=>r.json()).then(d => {
    if (d.success) sysMsg('💭 ' + d.thought);
  });
}

function doDream() {
  sysMsg('🌙 Initiating background consolidation dream cycle...');
  fetch('/api/dream', { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        sysMsg('💤 Dream complete:\n' + d.report);
        refreshStats();
        updateMemory();
      } else {
        sysMsg('❌ Dream cycle failed: ' + d.error);
      }
    });
}

function doReflect() {
  sysMsg('🔍 Initiating self-improvement reflection cycle...');
  fetch('/api/reflect', { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        sysMsg('💡 Reflection complete:\n' + d.note);
        refreshStats();
        updateMemory();
      } else {
        sysMsg('❌ Reflection cycle failed: ' + d.error);
      }
    });
}

function doForget() {
  if (!confirm('Erase ALL memories?')) return;
  fetch('/api/forget', {method:'POST'}).then(r=>r.json()).then(d => {
    if (d.success) { sysMsg('🔄 ' + d.message); refreshStats(); updateMemory(); }
  });
}

// ── crawler ───────────────────────────────────────────────────────
function startCrawl() {
  const url   = document.getElementById('crawl-url').value.trim();
  const depth = parseInt(document.getElementById('crawl-depth').value);
  const pages = parseInt(document.getElementById('crawl-pages').value);

  if (!url) { alert('Paste a URL first.'); return; }
  if (!url.startsWith('http')) { alert('URL must start with http:// or https://'); return; }

  const btn      = document.getElementById('btn-crawl');
  const progress = document.getElementById('crawl-progress');
  const output   = document.getElementById('eval-output');

  btn.disabled      = true;
  btn.textContent   = '⏳ Crawling…';
  progress.style.display = 'block';
  output.innerHTML  = '';

  fetch('/api/crawl', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({url, depth, max_pages: pages})
  })
  .then(r => r.json())
  .then(d => {
    if (!d.success) {
      output.innerHTML = `<div style="color:#e74c3c;padding:10px">${escHtml(d.error)}</div>`;
      return;
    }
    renderEval(d.evaluation);
    refreshStats();
    updateMemory();
  })
  .catch(e => {
    output.innerHTML = `<div style="color:#e74c3c;padding:10px">Error: ${escHtml(e.message)}</div>`;
  })
  .finally(() => {
    btn.disabled    = false;
    btn.textContent = '🌐 Crawl & Learn';
    progress.style.display = 'none';
  });
}

function renderEval(ev) {
  const s   = ev.summary;
  const qClass = {'A':'qa','B':'qb','C':'qc','D':'qd','F':'qf'};
  const letter = (s.quality_score || 'F').charAt(0);
  const qcls   = qClass[letter] || 'qf';

  let html = `
    <div class="eval-section">
      <h3>Crawl Summary</h3>
      <div class="quality-badge ${qcls}">${s.quality_score}</div>
      <div class="eval-grid">
        <div class="eval-card"><div class="ev-label">Pages visited</div><div class="ev-val">${s.pages_visited}</div></div>
        <div class="eval-card"><div class="ev-label">Facts stored</div><div class="ev-val">${s.facts_stored}</div></div>
        <div class="eval-card"><div class="ev-label">Duplicates</div><div class="ev-val">${s.duplicates}</div></div>
        <div class="eval-card"><div class="ev-label">Knowledge gain</div><div class="ev-val">+${s.knowledge_gain}%</div></div>
        <div class="eval-card"><div class="ev-label">Words read</div><div class="ev-val">${s.total_words.toLocaleString()}</div></div>
        <div class="eval-card"><div class="ev-label">Time</div><div class="ev-val">${s.elapsed_ms}ms</div></div>
      </div>
    </div>`;

  if (ev.top_topics && ev.top_topics.length) {
    html += `<div class="eval-section"><h3>Top Topics Learned</h3>`;
    for (const t of ev.top_topics.slice(0,8)) {
      html += `<span style="display:inline-block;background:#e8eaf6;color:#3949ab;
        border-radius:20px;padding:3px 10px;font-size:12px;margin:2px">${escHtml(t)}</span>`;
    }
    html += '</div>';
  }

  if (ev.top_facts && ev.top_facts.length) {
    html += `<div class="eval-section"><h3>Sample Facts Learned</h3><div class="fact-list">`;
    for (const f of ev.top_facts.slice(0,12)) {
      html += `<div class="fl-row">
        <span class="fl-subj">${escHtml(f.subject)}</span>
        <span class="fl-rel">${escHtml(f.relation)}</span>
        <span class="fl-obj">${escHtml(f.object)}</span>
        <span class="fl-conf">${Math.round(f.confidence*100)}%</span>
      </div>`;
    }
    html += '</div></div>';
  }

  if (ev.page_results && ev.page_results.length) {
    html += `<div class="eval-section"><h3>Pages</h3>`;
    for (const p of ev.page_results) {
      html += `<div class="page-item">
        <div class="page-title" title="${escHtml(p.url)}">${escHtml(p.title || p.url)}</div>
        <div class="page-meta">
          ${p.stored} stored · ${p.skipped} dup · ${p.words} words · ${p.ms}ms
          ${p.top_topics.length ? ' · ' + p.top_topics.slice(0,3).map(escHtml).join(', ') : ''}
        </div>
        ${p.error ? `<div class="page-error">Error: ${escHtml(p.error)}</div>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  if (ev.inference_note) {
    html += `<div class="infer-note">🔗 ${escHtml(ev.inference_note)}</div>`;
  }

  document.getElementById('eval-output').innerHTML = html;
}

// ── vis-network graph loader ──────────────────────────────────────
function loadGraph() {
  const container = document.getElementById('graph-container');
  container.innerHTML = '<div class="empty-state">Loading Knowledge Graph...</div>';
  
  fetch('/api/graph')
    .then(r => r.json())
    .then(data => {
      if (!data.success || !data.nodes.length) {
        container.innerHTML = '<div class="empty-state">No graph data available yet. Teach me some facts first!</div>';
        return;
      }
      
      container.innerHTML = '';
      
      const nodes = new vis.DataSet(data.nodes.map(n => ({
        id: n.id,
        label: n.label,
        value: n.value,
        title: n.title,
        shape: 'dot',
        color: {
          background: n.id === 'jarvix' ? '#ff6b6b' : '#667eea',
          border: '#764ba2',
          highlight: { background: '#ffd93d', border: '#ff6b6b' }
        },
        font: { color: '#333', size: 12, face: 'Segoe UI' }
      })));
      
      const edges = new vis.DataSet(data.edges);
      
      const graphData = { nodes, edges };
      const options = {
        nodes: {
          scaling: { min: 10, max: 30 }
        },
        edges: {
          font: { size: 10, align: 'middle' },
          color: { inherit: 'from' },
          smooth: { type: 'continuous' }
        },
        physics: {
          barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 95 },
          stabilization: { iterations: 150 }
        }
      };
      
      network = new vis.Network(container, graphData, options);
    })
    .catch(err => {
      container.innerHTML = `<div class="empty-state" style="color:#e74c3c;">Failed to load graph: ${err.message}</div>`;
    });
}
