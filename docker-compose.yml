version: '3.9'

services:
  curiousmind:
    build:
      context: .
      dockerfile: Dockerfile
    image: curiousmind:web
    container_name: curiousmind
    ports:
      - "5000:5000"
    volumes:
      # Persistent memory storage
      - curiousmind_memory:/app/data
    environment:
      # Python unbuffered output for real-time logs
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 5s

volumes:
  curiousmind_memory:
    driver: local
